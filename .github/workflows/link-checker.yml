name: Scholarship Link Checker

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run link checker
        id: checker
        run: |
          set +e
          OUTPUT=$(node scripts/check-links.js 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            BROKEN=$(echo "$OUTPUT" | grep '^BROKEN_LINKS_JSON=' | sed 's/^BROKEN_LINKS_JSON=//')
            echo "broken_json=$BROKEN" >> "$GITHUB_OUTPUT"
            echo "has_broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Issue for broken links
        if: steps.checker.outputs.has_broken == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const broken = JSON.parse(process.env.BROKEN_JSON);
            const date = new Date().toISOString().slice(0, 10);

            const rows = broken
              .map(b => `| ${b.name} | ${b.url} | \`${b.error}\` |`)
              .join('\n');

            const body = [
              `The weekly link checker found **${broken.length}** broken scholarship URL(s) on ${date}.`,
              '',
              '| Scholarship | URL | Error |',
              '|-------------|-----|-------|',
              rows,
              '',
              '_Auto-generated by the [Scholarship Link Checker](.github/workflows/link-checker.yml) workflow._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Broken scholarship links - ${date}`,
              body,
              labels: ['broken-link'],
            });
        env:
          BROKEN_JSON: ${{ steps.checker.outputs.broken_json }}
