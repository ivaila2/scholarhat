name: Scholarship Submission

on:
  workflow_dispatch:
    inputs:
      name:
        description: Scholarship name
        required: true
      organization:
        description: Organization name
        required: true
      amount:
        description: 'Award amount (e.g. 1500)'
        required: true
      deadline:
        description: 'Deadline (e.g. 2026-05-31)'
        required: true
      applyUrl:
        description: Direct application URL
        required: true
      category:
        description: 'Category (Academic/Arts/Trades/Community/STEM/Health/Engineering/Environmental/Indigenous)'
        required: true
      region:
        description: 'Region (Medicine Hat/Calgary/Edmonton/Lethbridge/Alberta-wide/National)'
        required: true
      description:
        description: One sentence description
        required: true
      submitter_name:
        description: Submitter name (optional)
        required: false
      submitter_email:
        description: Submitter email (optional)
        required: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process submission
        id: process
        env:
          INPUT_NAME: ${{ inputs.name }}
          INPUT_ORGANIZATION: ${{ inputs.organization }}
          INPUT_AMOUNT: ${{ inputs.amount }}
          INPUT_DEADLINE: ${{ inputs.deadline }}
          INPUT_APPLY_URL: ${{ inputs.applyUrl }}
          INPUT_CATEGORY: ${{ inputs.category }}
          INPUT_REGION: ${{ inputs.region }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_SUBMITTER_NAME: ${{ inputs.submitter_name }}
          INPUT_SUBMITTER_EMAIL: ${{ inputs.submitter_email }}
        run: |
          OUTPUT=$(node scripts/process-submission.js)
          echo "$OUTPUT"
          ENTRY=$(echo "$OUTPUT" | grep '^ENTRY_JSON=' | sed 's/^ENTRY_JSON=//')
          echo "entry_json=$ENTRY" >> "$GITHUB_OUTPUT"

      - name: Commit submission
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add src/data/scholarships.json
          git commit -m "submission: ${{ inputs.name }}"
          git push

      - name: Open review issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const entry = JSON.parse(process.env.ENTRY_JSON);
            const submitter = entry.submitter_name
              ? `${entry.submitter_name}${entry.submitter_email ? ` (${entry.submitter_email})` : ''}`
              : '_not provided_';

            const body = [
              `A new scholarship has been submitted and added to \`scholarships.json\` with \`pendingReview: true\` and \`active: false\`.`,
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **ID** | \`${entry.id}\` |`,
              `| **Name** | ${entry.title} |`,
              `| **Organization** | ${entry.organization} |`,
              `| **Amount** | ${entry.amount} |`,
              `| **Deadline** | ${entry.deadline} |`,
              `| **Category** | ${entry.category} |`,
              `| **Region** | ${entry.region} |`,
              `| **Apply URL** | ${entry.applyUrl} |`,
              `| **Description** | ${entry.description} |`,
              `| **Submitted by** | ${submitter} |`,
              '',
              '### To publish',
              `In \`src/data/scholarships.json\`, find the entry with id \`${entry.id}\` and set:`,
              '```json',
              '"pendingReview": false,',
              '"active": true',
              '```',
              '',
              '_Auto-generated by the [Scholarship Submission](.github/workflows/scholarship-submission.yml) workflow._',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New submission: ${{ inputs.name }}`,
              body,
              labels: ['submission'],
            });
        env:
          ENTRY_JSON: ${{ steps.process.outputs.entry_json }}
